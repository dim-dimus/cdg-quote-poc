name: Pricing Engine

on:
  push:
    paths:
      - 'packages/pricing/**'
      - '.github/workflows/engine.yml'
  pull_request:
    paths:
      - 'packages/pricing/**'
      - '.github/workflows/engine.yml'

jobs:
  test:
    name: Engine tests (PHP 8.3)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Install engine dependencies
        working-directory: packages/pricing
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run engine test suite
        working-directory: packages/pricing
        run: ./vendor/bin/pest

      - name: Check for forbidden framework imports in engine
        run: |
          PATTERN='Illuminate\\|Eloquent|Livewire|request\(|response\(|app\(|config\(|env\(|DB::|Cache::|Storage::|auth\('
          if grep -rE "$PATTERN" packages/pricing/src/; then
            echo "ERROR: Framework import detected in packages/pricing/src/ — the engine must have zero framework dependencies."
            exit 1
          fi
          echo "OK: No forbidden framework imports found."
