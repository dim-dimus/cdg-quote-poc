name: Pricing Engine

on:
  push:
    paths:
      - 'packages/pricing/**'
      - '.github/workflows/engine.yml'
  pull_request:
    paths:
      - 'packages/pricing/**'
      - '.github/workflows/engine.yml'

jobs:
  test:
    name: Engine tests (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # 8.3 = the engine's declared minimum (its compatibility contract).
        # 8.4 = the version the app actually runs the engine under.
        # Testing both proves the 8.3→8.4 compatibility range holds.
        php-version: ['8.3', '8.4']

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: none

      - name: Install engine dependencies
        working-directory: packages/pricing
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run engine test suite
        working-directory: packages/pricing
        run: ./vendor/bin/pest

      - name: Check for forbidden framework imports in engine
        run: |
          PATTERN='Illuminate\\|Eloquent|Livewire|request\(|response\(|app\(|config\(|env\(|DB::|Cache::|Storage::|auth\('
          if grep -rE "$PATTERN" packages/pricing/src/; then
            echo "ERROR: Framework import detected in packages/pricing/src/ — the engine must have zero framework dependencies."
            exit 1
          fi
          echo "OK: No forbidden framework imports found."
