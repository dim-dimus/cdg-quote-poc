name: CI

on:
  push:
  pull_request:

jobs:
  engine-tests:
    name: Engine tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install engine dependencies
        working-directory: packages/pricing
        run: composer install --no-interaction --prefer-dist

      - name: Run engine Pest suite
        working-directory: packages/pricing
        run: ./vendor/bin/pest

  engine-isolation:
    name: Engine isolation guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if forbidden framework symbols found in engine
        run: |
          if grep -rE \
            'Illuminate\\|Eloquent|Livewire|request\(|response\(|app\(|config\(|env\(|DB::|Cache::|Storage::|auth\(' \
            packages/pricing/src; then
            echo "::error::Forbidden framework symbol detected in packages/pricing/src"
            exit 1
          fi
